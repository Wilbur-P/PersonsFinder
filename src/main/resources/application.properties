spring.datasource.url=jdbc:h2:mem:personsfinder;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.jackson.deserialization.fail-on-missing-creator-properties=true
spring.jackson.deserialization.fail-on-null-for-primitives=true

spring.h2.console.enabled=false

# Keep API docs closed by default; enable via dev profile only.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

app.nearby.max-radius-km=50
app.nearby.default-limit=50
app.nearby.max-limit=200
